# Nightly: native release gates (manifest + engine + spine contracts) then sysproxy integration E2E.
name: Nightly native gates + Sysproxy E2E

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 2 * * *'  # every day at 02:00 UTC
  workflow_dispatch:

jobs:
  sysproxy-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc curl iproute2 ripgrep jq python3

      - name: Native release gates
        run: |
          chmod +x \
            scripts/check_azl_native_gates.sh \
            scripts/verify_native_runtime_live.sh \
            scripts/verify_enterprise_native_http_live.sh \
            scripts/verify_quantum_lha3_stack.sh \
            scripts/verify_azl_grammar_conformance.sh \
            scripts/verify_runtime_spine_contract.sh \
            scripts/verify_p0_interpreter_tokenizer_boundary.sh \
            2>/dev/null || true
          bash scripts/check_azl_native_gates.sh

      - name: Stop lingering daemons before sysproxy E2E
        run: |
          pkill -f sysproxy || true
          pkill -f azl_syswire || true
          pkill -f run_enterprise_daemon || true
          pkill -f azl-native-engine || true
          pkill -f start_azl_native_mode || true
          sleep 2

      - name: Build sysproxy
        run: |
          mkdir -p .azl
          gcc -O2 -Wall -o .azl/sysproxy tools/sysproxy.c

      - name: Run sysproxy integration test (timeout 120s)
        run: |
          timeout 120s bash scripts/test_sysproxy_setup.sh

      - name: Verify health endpoints
        run: |
          # Give a bit more time for readiness
          for i in $(seq 1 10); do
            curl -sf http://127.0.0.1:8080/healthz && break || sleep 1
          done
          # Use Bearer token if required
          if [ "${AZL_REQUIRE_API_TOKEN:-true}" != "false" ] && [ -n "${AZL_API_TOKEN:-}" ]; then
            H="Authorization: Bearer ${AZL_API_TOKEN}"
            curl -sf -H "$H" http://127.0.0.1:8080/healthz
            curl -sf -H "$H" http://127.0.0.1:8080/readyz || true
            curl -sf -H "$H" http://127.0.0.1:8080/status || true
          else
            curl -sf http://127.0.0.1:8080/healthz
            curl -sf http://127.0.0.1:8080/readyz || true
            curl -sf http://127.0.0.1:8080/status || true
          fi

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-sysproxy-logs
          path: |
            .azl/logs/sysproxy.out
            .azl/logs/sysproxy.log
            .azl/logs/wire.log
            .azl/logs/daemon.out

      - name: Cleanup (always)
        if: always()
        run: |
          pkill -f sysproxy || true
          pkill -f azl_syswire || true
          pkill -f run_enterprise_daemon || true
          echo 'Cleaned lingering processes'
