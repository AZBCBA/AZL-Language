# Legacy manual CI — superseded for PR/push by test-and-deploy.yml (canonical guards + run_all_tests + perf + AZME E2E).
# Run from Actions tab when you need this exact job layout without the full deploy pipeline.
name: AZL CI (manual)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ripgrep jq

      - name: Gate - No placeholders/TODO/FIXME in .azl
        run: |
          ! rg -n -i -E 'placeholder|TODO|FIXME' -- '*.azl' || (echo 'Placeholder/TODO/FIXME found in .azl files' && rg -n -i -E 'placeholder|TODO|FIXME' -- '*.azl' && exit 1)

      - name: Gate - No stale v2 references
        run: |
          ! rg -n -i -E '::parser\.v2|azl_v2_(interpreter|runner|parser)\.azl|AZL v2' || (echo 'Stale v2 references found' && rg -n -i -E '::parser\.v2|azl_v2_(interpreter|runner|parser)\.azl|AZL v2' && exit 1)

      - name: Prepare combined run script
        run: bash scripts/run_full.sh

      - name: Audit live paths
        run: bash scripts/audit_live_path.sh

      - name: Runtime smoke - Native
        run: |
          chmod +x scripts/verify_enterprise_native_http_live.sh scripts/verify_native_runtime_live.sh || true
          bash scripts/check_azl_native_gates.sh
          bash scripts/verify_native_runtime_live.sh
          bash scripts/verify_enterprise_native_http_live.sh

      - name: Perf smoke
        run: bash scripts/perf_smoke.sh

      # Baselines tuned for ubuntu-latest (GitHub-hosted); stricter local baselines can override in env.
      - name: Benchmark gate (block if >10% regression)
        env:
          AZL_BENCH_BASELINE_healthz: "9000"
          AZL_BENCH_BASELINE_status: "8800"
          AZL_BENCH_BASELINE_exec_state: "8800"
          AZL_BENCH_REGRESSION_THRESHOLD: "10"
        run: |
          chmod +x scripts/benchmark_gate.sh || true
          bash scripts/benchmark_gate.sh

      - name: Run all AZL tests (strict)
        run: |
          chmod +x scripts/run_all_tests.sh || true
          ./scripts/run_all_tests.sh


  azme-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc curl iproute2 jq
      - name: Run AZME E2E
        env:
          AZL_REQUIRE_API_TOKEN: "true"
          AZL_API_TOKEN: "ci-azme-token"
          AZME_PROVIDER_E2E: "1"
          AZL_HTTP_MAX_REQUEST_SIZE: "64"
          AZL_HTTP_RATE_WINDOW_MS: "500"
          AZL_HTTP_RATE_MAX_PER_WINDOW: "2"
        run: |
          bash scripts/azme_e2e.sh | cat
      - name: Upload AZME E2E logs (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: azme-e2e-logs
          path: |
            .azl/logs/daemon.out
            .azl/logs/sysproxy.out
            .azl/logs/sysproxy.log
            .azl/logs/wire.log
            .azl/logs/wire.requests.log
            .azl/logs/wire.responses.log
            .azl/azme_models.json
            .azl/azme_chat.json
            .azl/azme_proxy_workspaces.json
            .azl/azme_proxy_chat.json

