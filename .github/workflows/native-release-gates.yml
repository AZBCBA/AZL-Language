# Superseded for PR/push: test-and-deploy.yml runs run_all_tests.sh → run_tests.sh (canonical stack + native gates + live verify).
# Use Actions → Run workflow for a focused native-gates-only run.
name: native-release-gates (manual)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  native-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc ripgrep curl jq

      - name: Canonical stack enforcement
        run: bash scripts/enforce_canonical_stack.sh

      - name: Native gate checks
        run: bash scripts/check_azl_native_gates.sh

      - name: Legacy entrypoint blocklist
        run: bash scripts/enforce_legacy_entrypoint_blocklist.sh

      - name: Live native runtime verification
        run: bash scripts/verify_native_runtime_live.sh

      - name: Full test suite
        run: bash scripts/run_all_tests.sh
