name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare sample bundles
        run: |
          mkdir -p dist
          # Bundle core examples
          cat test_core.azl > dist/test_core.azl
          cat test_integration_final.azl > dist/test_integration_final.azl
          # Include runbooks
          cp README.md OPERATIONS.md dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/test_core.azl
            dist/test_integration_final.azl
            dist/README.md
            dist/OPERATIONS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
