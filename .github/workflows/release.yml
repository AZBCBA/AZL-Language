name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare sample bundles
        run: |
          mkdir -p dist
          # Bundle core examples
          cat smoke_test.azl > dist/smoke_test.azl
          cat azl/testing/system/test_canonical_azl.azl > dist/test_canonical_azl.azl
          # Include runbooks
          cp README.md OPERATIONS.md dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/smoke_test.azl
            dist/test_canonical_azl.azl
            dist/README.md
            dist/OPERATIONS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
