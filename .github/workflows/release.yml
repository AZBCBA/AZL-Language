name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual runs use the branch ref (refs/heads/*) — the release script exits with ERROR unless the
  # workflow was triggered by a version tag push. Re-run a failed tag workflow from the Actions UI.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare sample bundles
        run: |
          mkdir -p dist
          # Bundle core examples
          cat smoke_test.azl > dist/smoke_test.azl
          cat azl/testing/system/test_canonical_azl.azl > dist/test_canonical_azl.azl
          # Include runbooks
          cp README.md OPERATIONS.md dist/

      - name: Create GitHub Release (gh CLI; no Node 20 composite action)
        run: |
          chmod +x scripts/gh_create_sample_release.sh
          bash scripts/gh_create_sample_release.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
