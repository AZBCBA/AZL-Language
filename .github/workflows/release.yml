name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing version tag to publish (e.g. v1.2.3). Repository is checked out at this ref; must exist on the remote.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq (workflow_dispatch — gh_verify_remote_tag URI encoding)
        if: github.event_name == 'workflow_dispatch'
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Verify remote tag exists (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          chmod +x scripts/gh_verify_remote_tag.sh
          bash scripts/gh_verify_remote_tag.sh "${{ github.event.inputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Prepare sample bundles
        run: |
          mkdir -p dist
          # Bundle core examples
          cat smoke_test.azl > dist/smoke_test.azl
          cat azl/testing/system/test_canonical_azl.azl > dist/test_canonical_azl.azl
          # Include runbooks
          cp README.md OPERATIONS.md dist/

      - name: Create GitHub Release (gh CLI; no Node 20 composite action)
        run: |
          chmod +x scripts/gh_create_sample_release.sh
          bash scripts/gh_create_sample_release.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZL_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
