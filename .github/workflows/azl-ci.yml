name: AZL CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Make test scripts executable
        run: chmod +x scripts/run_all_tests.sh scripts/run_pure_tests.sh scripts/check_no_placeholders.sh || true

      - name: Check no placeholders
        run: ./scripts/check_no_placeholders.sh

      - name: Run all AZL tests (strict)
        run: |
          chmod +x scripts/run_all_tests.sh || true
          ./scripts/run_all_tests.sh

