# Runs on all branches; canonical main-gates workflow is ci.yml (same repo, narrower triggers).
name: AZL CI (all branches)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ripgrep gcc curl iproute2 openssl jq

      - name: Make test scripts executable
        run: chmod +x scripts/run_all_tests.sh scripts/run_pure_tests.sh scripts/check_no_placeholders.sh scripts/run_examples.sh || true

      - name: Check no placeholders
        run: ./scripts/check_no_placeholders.sh

      - name: Run all AZL tests (strict)
        run: |
          chmod +x scripts/run_all_tests.sh || true
          ./scripts/run_all_tests.sh

      - name: Run all AZL examples (strict)
        run: |
          chmod +x scripts/run_examples.sh || true
          ./scripts/run_examples.sh

